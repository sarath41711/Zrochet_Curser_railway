<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop handcrafted crochet mini bags from Zrochet — compact, artisan-made, and one of a kind.">
  <title>Mini Bags — Zrochet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="listing">
  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="index.html" class="navbar__logo">Zrochet</a>

      <button class="navbar__toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="navbar__nav" id="navMenu">
        <a href="index.html#home" class="nav-link">Home</a>
        <a href="index.html#shop" class="nav-link">Shop</a>
        <a href="mini-bags.html" class="nav-link active">Mini Bags</a>
        <a href="index.html#about" class="nav-link">About</a>
        <a href="index.html#contact" class="nav-link">Contact</a>
      </nav>

      <button class="navbar__cart" id="cartBtn" aria-label="Shopping cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main class="minibag-page">
    <section class="minibag-hero section">
      <div class="container">
        <nav class="breadcrumb fade-in" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span aria-hidden="true">/</span>
          <a href="index.html#collections">Collections</a>
          <span aria-hidden="true">/</span>
          <span aria-current="page">Mini Bags</span>
        </nav>
        <div class="section-header fade-in">
          <span class="section-eyebrow">Petite &amp; Charming</span>
          <h1 class="section-title">Mini Bags</h1>
          <p class="section-desc">Handcrafted crochet mini bags — each style grouped with its full photo gallery. Tap a bag to explore every angle.</p>
        </div>
      </div>
    </section>

    <section class="products section minibag-listing">
      <div class="container">
        <div class="products__grid" id="minibagGrid">
          <div class="minibag-loading fade-in visible" aria-live="polite">
            <p>Loading mini bags…</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p>&copy; 2026 Zrochet. All rights reserved.</p>
        <a href="index.html">Back to Home</a>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="mini-bags.js"></script>
</body>
</html>
